name: Sentinel Alignment Tournament CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  alignment-validation:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Pull the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment (using 3.9 for stability)
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Speeds up future runs

      # 3. Install required libraries (axelrod, matplotlib, etc.)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Execute the SAT Tournament and generate visual artifacts
      - name: Run SAT Tournament & Baseline
        run: python main.py --iterations 10
        
      # 5. Extract and upload visual data (ISC charts)
      - name: Upload SAT Visualizations
        uses: actions/upload-artifact@v4
        with:
          name: sat-alignment-results
          path: data/*.png
          retention-days: 7 # Keep the visuals for a week
